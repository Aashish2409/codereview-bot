# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── GitHub Configuration ─────────────────────────────────
# Fine-grained PAT with only pull_requests:write permission
github.token=${GITHUB_TOKEN}
# Secret you set when creating the webhook on GitHub
github.webhook.secret=${GITHUB_WEBHOOK_SECRET}
github.api.base-url=https://api.github.com

# ─── Groq / LLaMA Configuration ───────────────────────────
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ─── Security & Limits ────────────────────────────────────
# Max diff characters sent to AI (prevents token-limit DoS)
app.max.diff.chars=8000
# Rate limit: max requests per window per repository
app.rate.limit.requests=10
app.rate.limit.minutes=1

# ─── Actuator (health check for Railway) ──────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging ──────────────────────────────────────────────
logging.level.com.codereviewbot=INFO
